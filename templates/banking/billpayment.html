{% extends 'banking/base.html' %}
{% load humanize %}
{% block title %}X Bank | Bill Payment{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-lg-7">
<div class="card-bank">
  <div class="card-header-bank"><i class="fas fa-file-invoice-dollar fa-2x mb-2"></i><h3>Bill Payment</h3><p class="mb-0 opacity-75">Pay utility bills instantly · OTP confirmed</p></div>
  <div class="p-4 p-md-5"><form method="post" novalidate>{% csrf_token %}
    <div class="mb-4"><label class="form-label fw-semibold">From Account</label>
      <div class="input-group-bank"><i class="fas fa-university input-icon"></i>
        <select name="account" class="form-control form-control-bank" required>
          {% for acc in form.account.field.queryset %}
          <option value="{{ acc.pk }}">{{ acc.account_number }} — ৳{{ acc.balance|floatformat:2|intcomma }}</option>
          {% empty %}<option value="">No active accounts</option>{% endfor %}
        </select></div></div>
    <div class="row g-3 mb-4">
      <div class="col-md-6"><label class="form-label fw-semibold">Bill Type</label>
        <div class="input-group-bank"><i class="fas fa-bolt input-icon"></i>
          <select name="biller_type" class="form-control form-control-bank">
            <option value="ELECTRICITY">⚡ Electricity</option>
            <option value="GAS">🔥 Gas</option>
            <option value="WATER">💧 Water</option>
            <option value="INTERNET">🌐 Internet</option>
            <option value="TV">📺 Cable TV</option>
            <option value="PHONE">📞 Phone</option>
            <option value="INSURANCE">🛡️ Insurance</option>
            <option value="OTHER">📋 Other</option>
          </select></div></div>
      <div class="col-md-6"><label class="form-label fw-semibold">Service Provider</label>
        <div class="input-group-bank"><i class="fas fa-building input-icon"></i>
          <input type="text" name="biller_name" class="form-control form-control-bank" placeholder="e.g. DESCO, Titas Gas" required></div></div>
    </div>
    <div class="mb-4"><label class="form-label fw-semibold">Consumer / Bill ID</label>
      <div class="input-group-bank"><i class="fas fa-hashtag input-icon"></i>
        <input type="text" name="consumer_id" class="form-control form-control-bank" placeholder="Your consumer or bill ID number" required></div></div>
    <div class="mb-4"><label class="form-label fw-semibold">Billing Month <span class="text-muted fw-normal">(optional)</span></label>
      <div class="input-group-bank"><i class="fas fa-calendar input-icon"></i>
        <input type="text" name="billing_month" class="form-control form-control-bank" placeholder="e.g. April 2025"></div></div>
    <div class="mb-4"><label class="form-label fw-semibold">Amount (BDT)</label>
      <div class="input-group-bank"><i class="fas fa-coins input-icon"></i>
        <input type="number" name="amount" id="amtInput" class="form-control form-control-bank" placeholder="Bill amount" step="0.01" min="10" required></div>
      <div class="d-flex gap-2 mt-2 flex-wrap">
        <button type="button" class="btn btn-sm btn-outline-success qamt" data-a="200">৳200</button>
        <button type="button" class="btn btn-sm btn-outline-success qamt" data-a="500">৳500</button>
        <button type="button" class="btn btn-sm btn-outline-success qamt" data-a="1000">৳1,000</button>
        <button type="button" class="btn btn-sm btn-outline-success qamt" data-a="2000">৳2,000</button>
      </div></div>
    <div class="alert alert-warning rounded-3 mb-4"><i class="fas fa-shield-alt me-2"></i>OTP required to confirm payment.</div>
    <button type="submit" class="btn btn-primary-bank w-100"><i class="fas fa-file-invoice-dollar me-2"></i>Pay Bill</button>
  </form></div></div>
</div></div></div>
{% endblock %}
{% block extra_js %}<script>document.querySelectorAll('.qamt').forEach(b=>b.addEventListener('click',function(){document.getElementById('amtInput').value=this.dataset.a;}));</script>{% endblock %}
