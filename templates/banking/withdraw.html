{% extends 'banking/base.html' %}
{% load humanize %}
{% block title %}X Bank | Withdraw{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-lg-7">
<div class="card-bank">
  <div class="card-header-bank"><i class="fas fa-arrow-up fa-2x mb-2"></i><h3>Withdraw Funds</h3><p class="mb-0 opacity-75">Secure cash withdrawal · OTP confirmed</p></div>
  <div class="p-4 p-md-5">
    <form method="post" novalidate>{% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-semibold">From Account</label>
        <div class="input-group-bank">
          <i class="fas fa-university input-icon"></i>
          <select name="account" class="form-control form-control-bank" required>
            {% for acc in form.account.field.queryset %}
            <option value="{{ acc.pk }}">{{ acc.account_number }} — ৳{{ acc.balance|floatformat:2|intcomma }} ({{ acc.account_type }})</option>
            {% empty %}<option value="">No active accounts</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Withdrawal Method</label>
        <div class="input-group-bank">
          <i class="fas fa-exchange-alt input-icon"></i>
          <select name="withdrawal_method" class="form-control form-control-bank">
            <option value="ATM">ATM Withdrawal</option>
            <option value="BRANCH">Branch Counter</option>
            <option value="ONLINE">Online Transfer</option>
          </select>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Amount (BDT)</label>
        <div class="input-group-bank">
          <i class="fas fa-coins input-icon"></i>
          <input type="number" name="amount" id="amtInput" class="form-control form-control-bank" placeholder="Enter amount" step="0.01" min="10" required>
        </div>
        <div class="d-flex gap-2 mt-2 flex-wrap">
          <button type="button" class="btn btn-sm btn-outline-warning qamt" data-a="500">৳500</button>
          <button type="button" class="btn btn-sm btn-outline-warning qamt" data-a="1000">৳1,000</button>
          <button type="button" class="btn btn-sm btn-outline-warning qamt" data-a="2000">৳2,000</button>
          <button type="button" class="btn btn-sm btn-outline-warning qamt" data-a="5000">৳5,000</button>
          <button type="button" class="btn btn-sm btn-outline-warning qamt" data-a="10000">৳10,000</button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Note <span class="text-muted fw-normal">(optional)</span></label>
        <div class="input-group-bank">
          <i class="fas fa-pen input-icon"></i>
          <input type="text" name="note" class="form-control form-control-bank" placeholder="Withdrawal note">
        </div>
      </div>
      <div class="alert alert-warning rounded-3 mb-4"><i class="fas fa-shield-alt me-2"></i>OTP will be sent to your email to confirm.</div>
      <button type="submit" class="btn btn-primary-bank w-100"><i class="fas fa-arrow-up me-2"></i>Withdraw Now</button>
    </form>
  </div>
</div>
</div></div></div>
{% endblock %}
{% block extra_js %}
<script>document.querySelectorAll('.qamt').forEach(b=>b.addEventListener('click',function(){document.getElementById('amtInput').value=this.dataset.a;}));</script>
{% endblock %}
